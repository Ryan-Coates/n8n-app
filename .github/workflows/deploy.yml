name: Deploy to Server

# ── Trigger ───────────────────────────────────────────────────────────────────
# Manual dispatch only — no automatic deploys.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
      confirm:
        description: 'Type "deploy" to confirm'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy via WireGuard + SSH
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    # Guard against accidental triggers
    if: github.event.inputs.confirm == 'deploy'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Join the private Tailscale network ─────────────────────────────
      # Both this runner and the deploy-agent container on the server connect
      # OUT to Tailscale's coordination plane. No inbound ports, no firewall
      # rules, and no port-forwarding are required on the server.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      # ── 2. Deploy over SSH through the Tailscale tunnel ───────────────────
      - name: Write SSH key
        run: |
          install -m 0700 -d ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 0600 ~/.ssh/deploy_key

      - name: Run deploy script on server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_HOST }} \
              'DEPLOY_DIR=/repo N8N_URL=http://n8n:5678 bash /repo/scripts/deploy.sh'

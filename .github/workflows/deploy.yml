name: Deploy to Server

# ── Trigger ───────────────────────────────────────────────────────────────────
# Manual dispatch only — no automatic deploys.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
      confirm:
        description: 'Type "deploy" to confirm'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy via WireGuard + SSH
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    # Guard against accidental triggers
    if: github.event.inputs.confirm == 'deploy'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Install cloudflared on the runner ──────────────────────────────
      # cloudflared acts as the SSH ProxyCommand, routing the connection
      # through the Cloudflare tunnel to the deploy-agent on the server.
      # No inbound ports, no firewall rules, no VPN keys needed on the runner.
      - name: Install cloudflared
        run: |
          curl -fsSL --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared version

      # ── 2. Deploy over SSH through the Cloudflare tunnel ─────────────────
      - name: Write SSH key
        run: |
          install -m 0700 -d ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 0600 ~/.ssh/deploy_key

      - name: Run deploy script on server
        env:
          # cloudflared reads these automatically to authenticate with
          # the Cloudflare Access service token protecting the SSH hostname
          CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          ssh -o "ProxyCommand=cloudflared access ssh --hostname ${{ secrets.CF_TUNNEL_HOSTNAME }}" \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              -i ~/.ssh/deploy_key \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.CF_TUNNEL_HOSTNAME }} \
              'DEPLOY_DIR=/repo N8N_URL=http://n8n:5678 bash /repo/scripts/deploy.sh'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8npassword}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme_use_a_real_key}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro
      - workflows_shared:/workflows-shared
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Runs once after n8n is healthy — imports all workflow JSON files via the n8n CLI
  n8n-init:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: "no"
    depends_on:
      n8n:
        condition: service_healthy
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme_use_a_real_key}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro
      - ./n8n-init/import.sh:/import.sh:ro
    entrypoint: ["/bin/sh", "/import.sh"]

  # ── WireGuard VPN server ─────────────────────────────────────────────────────
  # Accepts encrypted UDP on 51820. The deploy-agent shares this container's
  # network namespace so SSH traffic arriving over the tunnel hits the
  # deploy-agent's sshd directly at 10.13.13.1:22.
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wg-server
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=0
      - PGID=0
      - TZ=Etc/UTC
      - SERVERURL=${WG_SERVER_URL:-213.218.200.158}
      - SERVERPORT=51820
      - PEERS=githubactions
      - PEERDNS=1.1.1.1
      - INTERNAL_SUBNET=10.13.13.0/24
      - ALLOWEDIPS=10.13.13.1/32
      - LOG_CONFS=true
    volumes:
      - wireguard_config:/config
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

  # ── Deploy agent (SSH target) ─────────────────────────────────────────────
  # Shares wireguard's network namespace — accessible at the WireGuard VPN IP.
  # GitHub Actions SSHs here after establishing the tunnel, then runs
  # scripts/deploy.sh which pulls main, reimports workflows, and restarts n8n.
  deploy-agent:
    build: ./deploy-agent
    container_name: deploy-agent
    network_mode: "service:wireguard"
    environment:
      - AUTHORIZED_KEY=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIYb2KkgJtRoOEZfJg+nqx9/UINLKNRC+/Q8JTWB4SqC root@3aca4447c599
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/repo
    depends_on:
      - wireguard
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
  workflows_shared:
  wireguard_config:

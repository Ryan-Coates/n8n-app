services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8npassword}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme_use_a_real_key}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro
      - workflows_shared:/workflows-shared
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Runs once after n8n is healthy — imports all workflow JSON files via the n8n CLI
  n8n-init:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: "no"
    depends_on:
      n8n:
        condition: service_healthy
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme_use_a_real_key}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro
      - ./n8n-init/import.sh:/import.sh:ro
    entrypoint: ["/bin/sh", "/import.sh"]

  # ── Tailscale VPN ────────────────────────────────────────────────────────────
  # Connects OUT to Tailscale's coordination server — no inbound ports, no
  # port-forwarding, no firewall rules needed on the host. The deploy-agent
  # shares this container's network namespace so it receives SSH traffic that
  # arrives over the Tailscale tunnel.
  tailscale:
    image: ghcr.io/tailscale/tailscale:stable
    container_name: ts-deploy
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=n8n-deploy-agent
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - tailscale_state:/var/lib/tailscale
    restart: unless-stopped

  # ── Deploy agent (SSH target) ─────────────────────────────────────────────
  # Shares the Tailscale container's network namespace — SSH traffic that
  # arrives over the Tailscale tunnel hits this container's sshd on port 22.
  # GitHub Actions joins the same Tailscale network and SSHes to the
  # Tailscale IP of this host (visible in the Tailscale admin console).
  deploy-agent:
    build: ./deploy-agent
    container_name: deploy-agent
    network_mode: "service:tailscale"
    environment:
      - AUTHORIZED_KEY=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIYb2KkgJtRoOEZfJg+nqx9/UINLKNRC+/Q8JTWB4SqC root@3aca4447c599
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/repo
    depends_on:
      - tailscale
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
  workflows_shared:
  tailscale_state:
